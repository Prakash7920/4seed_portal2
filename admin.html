<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="4Seed Admin Dashboard">
    
    <title>4Seed Admin Panel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header" role="banner">
            <h1>🌱 4Seed Admin Panel</h1>
            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </header>

        <!-- Dashboard Stats -->
        <section class="dashboard-stats" aria-label="Dashboard Statistics">
            <div class="stat-card">
                <h3>Total Partners</h3>
                <div class="stat-number" id="totalPartners">0</div>
            </div>
            
            <div class="stat-card">
                <h3>Active Partners</h3>
                <div class="stat-number" id="activePartners">0</div>
            </div>
            
            <div class="stat-card">
                <h3>Total Wallet</h3>
                <div class="stat-number" id="walletAmount">₹0</div>
            </div>
            
            <div class="stat-card">
                <h3>Blocked Partners</h3>
                <div class="stat-number" id="blockedPartners">0</div>
            </div>
        </section>

        <!-- Search & Filter Section -->
        <section class="search-section" aria-label="Search and Filter">
            <h2>Partners Management</h2>
            
            <div class="search-container">
                <input
                    type="text"
                    id="searchBox"
                    placeholder="Search Partner ID or Name"
                    aria-label="Search partners"
                    aria-describedby="searchHint">
                <span id="searchHint" class="sr-only">Type to search partners by ID or name</span>
                
                <select id="statusFilter" aria-label="Filter by status">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="blocked">Blocked</option>
                </select>
                
                <button id="refreshBtn" class="btn btn-secondary" aria-label="Refresh data">
                    ↻ Refresh
                </button>
            </div>
        </section>

        <!-- Partners Table -->
        <section class="table-section" aria-label="Partners Table">
            <table id="partnerTable" class="partners-table">
                <thead>
                    <tr>
                        <th scope="col">Partner ID</th>
                        <th scope="col">Name</th>
                        <th scope="col">Wallet</th>
                        <th scope="col">Status</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" class="text-center">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- Edit Partner Modal -->
        <div id="editPopup" class="modal" aria-labelledby="modalTitle" role="dialog" aria-modal="true">
            <div class="modal-content">
                <h2 id="modalTitle">Edit Partner</h2>
                
                <form id="editForm" onsubmit="event.preventDefault(); savePartner();">
                    <div class="form-group">
                        <label for="editPartnerId">Partner ID</label>
                        <input type="text" id="editPartnerId" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label for="editName">Full Name</label>
                        <input type="text" id="editName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editMobile">Mobile Number</label>
                        <input type="tel" id="editMobile" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editWallet">Wallet Amount</label>
                        <input type="number" id="editWallet" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editStatus">Status</label>
                        <select id="editStatus" required>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                            <option value="blocked">Blocked</option>
                        </select>
                    </div>
                    
                    <div class="button-group">
                        <button type="button" class="btn btn-primary" onclick="savePartner()">Save Changes</button>
                        <button type="button" class="btn btn-secondary" onclick="closePopup()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Error/Success Messages -->
        <div id="notification" class="notification" role="status" aria-live="polite"></div>
    </div>

    <script src="js/admin.js" defer></script>
</body>
</html>
